name: Deploy InsightHub Pages

on:
  workflow_run:
    workflows: ["Daily InsightHub"]
    types: [completed]
  workflow_dispatch: {}

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TZ: Asia/Shanghai
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_run' && format('refs/heads/{0}', github.event.workflow_run.head_branch) || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Check manifest
        id: manifest
        run: |
          if [ -f output/manifest/index.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::output/manifest/index.json not found; skip site build/deploy for this run."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build static site
        if: steps.manifest.outputs.exists == 'true'
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python scripts/build_site.py --manifest output/manifest/index.json --content-root output --output-dir site

      - name: Deploy to gh-pages
        if: steps.manifest.outputs.exists == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          force_orphan: true
