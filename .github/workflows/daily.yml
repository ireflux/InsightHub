name: Daily InsightHub

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch: {}

jobs:
  run-daily:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Run tests
        run: |
          python -m unittest discover -s tests -v

      - name: Run InsightHub workflow
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_SPACE_ID: ${{ secrets.FEISHU_SPACE_ID }}
          FEISHU_DOC_ID: ${{ secrets.FEISHU_DOC_ID }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ZHIPUAI_API_KEY: ${{ secrets.ZHIPUAI_API_KEY }}
          LLM_MODEL: ${{ vars.LLM_MODEL || 'glm-4.7-flash' }}
        run: |
          insighthub run

      - name: Commit and push history.json
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update history.json [skip ci]'
          file_pattern: 'history.json delivery_state.json'
