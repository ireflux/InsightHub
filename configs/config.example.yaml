# InsightHub Configuration Example
#
# Copy this file to configs/config.yaml and adjust as needed.
# Secrets must be provided via environment variables.

llm_provider:
  # Supported: openrouter, zhipuai
  name: "zhipuai"
  model: "glm-4.7-flash"

max_items: 8

prompt:
  structure: "professional_briefing_v1"
  style: "professional_neutral_v1"
  variables: {}

sources:
  - name: "github_trending"
  - name: "hacker_news"
  - name: "v2ex_hot"
  - name: "slashdot"
  # - name: "zhihu_hot"
  #   keyword_filter: "编程|AI|Python|技术|开发|机器学习|深度学习"

sinks:
  - name: "markdown_file"
    output_dir: "output"
  - name: "feishu_doc"
    default_title: "InsightHub {date}"
    # optional
    # space_id: ""
    # doc_id: ""

# Required env vars by provider:
# - ZHIPUAI_API_KEY (for zhipuai)
# - OPENROUTER_API_KEY (for openrouter)
#
# Required env vars for Feishu sink:
# - FEISHU_APP_ID
# - FEISHU_APP_SECRET
# Optional:
# - FEISHU_SPACE_ID
# - FEISHU_DOC_ID
