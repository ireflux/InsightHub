# InsightHub Configuration Example
#
# Copy this file to configs/config.yaml and adjust as needed.
# Secrets must be provided via environment variables.

llm:
  primary:
    provider: "zhipuai"
    model: "glm-4.7-flash"
    # base_url: "https://api.openai.com/v1"  # required for custom_openai/custom_anthropic
    # params:                                # optional, whitelist only
    #   temperature: 0.7
    #   top_p: 0.95
    #   max_tokens: 4096
    #   stop: ["\n\n"]
    #   stream: false                        # true is not supported currently
  fallbacks: []
  # fallbacks:
  #   - provider: "openrouter"
  #     model: "xiaomi/mimo-v2-flash:free"
  #   - provider: "custom_openai"
  #     model: "gpt-4o-mini"
  #     base_url: "https://api.openai.com/v1"
  #     params:
  #       temperature: 0.7
  #       top_p: 0.95
  #       max_tokens: 4096
  #   - provider: "custom_anthropic"
  #     model: "claude-3-5-sonnet-latest"
  #     base_url: "https://api.anthropic.com/v1"
  #     params:
  #       temperature: 0.3
  #       max_tokens: 4096

sources:
  defaults:
    max_items: 8
    content_fetch_concurrency: 4
    content_fetch_timeout: 10.0
  items:
    - id: "github_main"
      type: "github_trending"
      enabled: true
      max_items: 10
      params: {}
    - id: "hn_main"
      type: "hacker_news"
      enabled: true
      params: {}
    - id: "v2ex_main"
      type: "v2ex_hot"
      enabled: true
      params: {}
    - id: "slashdot_main"
      type: "slashdot"
      enabled: true
      params: {}
    # - id: "zhihu_ai"
    #   type: "zhihu_hot"
    #   enabled: false
    #   params:
    #     keyword_filter: "编程|AI|Python|技术|机器学习|深度学习"

prompt:
  structure: "professional_briefing_v4"
  style: "professional_neutral_v4"
  scoring: "technical_content_scoring_v2"
  variables: {}

publishing:
  title:
    template: "每日趋势观察 {date}"
    date_format: "%Y-%m-%d"
    strip_leading_h1: true

state:
  max_history_records: 3000
  max_delivery_item_records: 2000
  max_delivery_runs: 100

runtime:
  timezone: "Asia/Shanghai"
  paths:
    prompts_dir: "prompts"
    history_file: "history.json"
    delivery_state_file: "delivery_state.json"
    logs_dir: "logs"
  retry:
    source_fetch:
      max_attempts: 3
      base_delay_seconds: 1.0
      backoff_multiplier: 2.0
      max_delay_seconds: 30.0
    llm_summarize:
      max_attempts: 3
      base_delay_seconds: 2.0
      backoff_multiplier: 2.0
      max_delay_seconds: 30.0
    sink_render:
      max_attempts: 2
      base_delay_seconds: 1.0
      backoff_multiplier: 2.0
      max_delay_seconds: 30.0
  timeouts:
    source_discover_timeout_seconds: 20.0
  dedup:
    normalize_url: true
    strip_query_params:
      - "utm_source"
      - "utm_medium"
      - "utm_campaign"
      - "utm_term"
      - "utm_content"
      - "ref"
      - "source"
  observability:
    level: "INFO"
    format: "json"
    console_enabled: true
    file_enabled: true
    file_name_prefix: "insighthub"

scoring:
  enabled: false
  use_llm: false
  min_comments_for_summary: 1
  keep_top_n: 8
  scoring_prompt_name: "comment_priority_reasoning_v1"

sinks:
  defaults:
    enabled: true
  items:
    - id: "markdown_local"
      type: "markdown_file"
      params:
        output_dir: "output"
    - id: "feishu_daily"
      type: "feishu_doc"
      params:
        # optional
        # space_id: ""
        # doc_id: ""

# Required env vars by LLM providers:
# - ZHIPUAI_API_KEY (for zhipuai)
# - OPENROUTER_API_KEY (for openrouter)
# - NVIDIA_API_KEY (for nvidia)
# - CUSTOM_OPENAI_API_KEY (for custom_openai)
# - CUSTOM_ANTHROPIC_API_KEY (for custom_anthropic)
#
# Optional env vars for custom providers:
# - CUSTOM_OPENAI_BASE_URL
# - CUSTOM_ANTHROPIC_BASE_URL
# - CUSTOM_ANTHROPIC_VERSION (default: 2023-06-01)
#
# Required env vars for Feishu sink:
# - FEISHU_APP_ID
# - FEISHU_APP_SECRET
# Optional:
# - FEISHU_SPACE_ID
# - FEISHU_DOC_ID
