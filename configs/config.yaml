# InsightHub Configuration

# LLM configuration
# API keys must be provided via environment variables:
# - ZHIPUAI_API_KEY
# - OPENROUTER_API_KEY
llm:
  primary:
    provider: "openrouter"
    model: "stepfun/step-3.5-flash:free"
  fallbacks: []
  # fallbacks:
  #   - provider: "openrouter"
  #     model: "openai/gpt-5.4-pro"

# Sources configuration
sources:
  defaults:
    max_items: 8
    content_fetch_concurrency: 4
    content_fetch_timeout: 10.0
  items:
    - id: "github_main"
      type: "github_trending"
      enabled: true
      max_items: 5
      params: {}
    - id: "hn_main"
      type: "hacker_news"
      enabled: true
      max_items: 8
      params: {}
    - id: "v2ex_main"
      type: "v2ex_hot"
      enabled: false
      max_items: 8
      params: {}
    - id: "slashdot_main"
      type: "slashdot"
      enabled: true
      max_items: 8
      params: {}

prompt:
  structure: "structure_prompt_v1"
  style: "style_prompt_v1"
  variables: {}

publishing:
  title:
    template: "每日趋势观察 {date}"
    date_format: "%Y-%m-%d"
    strip_leading_h1: true

state:
  max_history_records: 3000
  max_delivery_item_records: 2000
  max_delivery_runs: 100

runtime:
  timezone: "Asia/Shanghai"
  paths:
    prompts_dir: "prompts"
    history_file: "history.json"
    delivery_state_file: "delivery_state.json"
    logs_dir: "logs"
    stage_runs_dir: "output/runs"
  retry:
    source_fetch:
      max_attempts: 3
      base_delay_seconds: 1.0
      backoff_multiplier: 2.0
      max_delay_seconds: 30.0
    llm_summarize:
      max_attempts: 3
      base_delay_seconds: 2.0
      backoff_multiplier: 2.0
      max_delay_seconds: 30.0
    sink_render:
      max_attempts: 2
      base_delay_seconds: 1.0
      backoff_multiplier: 2.0
      max_delay_seconds: 30.0
  timeouts:
    source_discover_timeout_seconds: 20.0
  dedup:
    normalize_url: true
    strip_query_params:
      - "utm_source"
      - "utm_medium"
      - "utm_campaign"
      - "utm_term"
      - "utm_content"
      - "ref"
      - "source"
  observability:
    level: "INFO"
    format: "json"
    console_enabled: true
    file_enabled: true
    file_name_prefix: "insighthub"

scoring:
  enabled: true
  scoring_threshold: 6.0

# Sinks configuration
sinks:
  defaults:
    enabled: true
  items:
    - id: "markdown_local"
      type: "markdown_file"
      enabled: true
      params:
        output_dir: "output"
    - id: "feishu_daily"
      type: "feishu_doc"
      enabled: false
      params:
        space_id: "7599692883666422737"
        # doc_id: ""
