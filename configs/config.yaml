# InsightHub Configuration

# LLM Provider Configuration
# Supported providers: "openrouter", "zhipuai"
llm_provider:
  name: "zhipuai"
  # API key must be provided via environment variables:
  # - OPENROUTER_API_KEY (for openrouter)
  # - ZHIPUAI_API_KEY (for zhipuai)
  # Specify the model to use for the selected provider
  model: "glm-4.7-flash" # e.g., "glm-4.7-flash" for zhipuai

# Sources Configuration
# Enable or disable sources by adding or removing them from this list.
max_items: 8

prompt:
  structure: "professional_briefing_v1"
  style: "professional_neutral_v1"
  variables:
    min_items: 12

state:
  max_history_records: 3000
  max_delivery_item_records: 2000
  max_delivery_runs: 100

sources:
  - name: "github_trending"
  - name: "hacker_news"
  - name: "v2ex_hot"
  - name: "slashdot"
  # - name: "zhihu_hot"
  #   # Optional: Add a regex filter for zhihu titles
  #   keyword_filter: "编程|AI|Python|技术|开发|机器学习|深度学习"

# Sinks Configuration
# Enable or disable sinks by adding or removing them from this list.
sinks:
  - name: "markdown_file"
    output_dir: "output"
  # Example of using Feishu Docs API (recommended)
  - name: "feishu_doc"
    # Credentials must be provided via environment variables:
    # FEISHU_APP_ID / FEISHU_APP_SECRET
    # optional: default title for created documents
    default_title: "InsightHub {date}"
    # optional: Wiki Space ID. If provided, creates a node in this Wiki Space instead of a standalone Doc.
    space_id: "7599692883666422737"
    # optional: existing doc id. If set, the workflow updates this doc instead of creating a new one.
    # doc_id: ""
